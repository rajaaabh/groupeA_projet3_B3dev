databases:
  - name: gymflow-db
    plan: free
    databaseName: gymflow

services:

  # -- Backend Laravel (PHP natif via Nixpacks) --
  - type: web
    name: gymflow-backend
    plan: free
    rootDir: backend
    buildCommand: composer install --no-dev --optimize-autoloader --no-interaction
    startCommand: php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_KEY
        generateValue: true
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: gymflow-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://gymflow-frontend.onrender.com

  # -- Frontend React (Static) --
  - type: static
    name: gymflow-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://gymflow-backend.onrender.com
